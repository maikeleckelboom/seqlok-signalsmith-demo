name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shim-build:
    name: Shim build (no Emscripten)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run vendor
      - run: pnpm run build
        env:
          DEV_SHIM: "1"

  full-build:
    name: Full build (with Emscripten)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.73
      - run: pnpm install --frozen-lockfile
      - run: pnpm run vendor
      - run: pnpm run build:wasm
      - run: pnpm run build
